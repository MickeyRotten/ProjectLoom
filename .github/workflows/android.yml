name: Android APK

# Builds the Capacitor-wrapped APK for main pushes, PRs, and manual runs.
# Docs-only pushes are skipped via paths-ignore; tag releases live in
# android-tag.yml so this filter can never skip them. All build logic is in the
# reusable _build-apk.yml.
# - push to main → build ONE APK + publish a continuous release (build-<n>)
# - pull_request → build + test only, no publish
# - manual       → build + test only, no publish

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - ".claude/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

# One build per ref; newer pushes cancel in-flight ones.
concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    uses: ./.github/workflows/_build-apk.yml
    secrets: inherit
    with:
      publish: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'continuous' || 'none' }}
