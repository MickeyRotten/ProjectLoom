name: Android APK

# Builds the Capacitor-wrapped web app into an installable APK.
# - Every push/PR: builds a debug APK and uploads it as a workflow artifact.
# - Tag push (v*): also builds a signed release APK (if signing secrets are
#   present) and attaches it to a GitHub Release, so the app can self-update.
#
# The native `android/` project is NOT committed — Capacitor regenerates it
# here from `capacitor.config.ts` via `cap add android`.

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Job-level env so the signing-secret presence check is usable in step `if:`.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Typecheck + test
        run: |
          npm run tsc
          npm test

      - name: Build web app
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform + sync
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: loom-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # --- Signed release: only on tag pushes, only if signing secrets exist ---
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v') && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/loom.keystore

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/v') && env.ANDROID_KEYSTORE_BASE64 != ''
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          LOOM_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          LOOM_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          LOOM_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=loom.keystore \
            -Pandroid.injected.signing.store.password="$LOOM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$LOOM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$LOOM_KEY_PASSWORD"

      - name: Publish release APK
        if: startsWith(github.ref, 'refs/tags/v') && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
